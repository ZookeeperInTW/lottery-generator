<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <!-- 正方形滿版背景漸層 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#0d0d22"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <!-- 紅球 -->
    <radialGradient id="r1" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff8c94"/>
      <stop offset="100%" stop-color="#c1121f"/>
    </radialGradient>
    <!-- 橙球 -->
    <radialGradient id="r2" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffcb8e"/>
      <stop offset="100%" stop-color="#d4721a"/>
    </radialGradient>
    <!-- 青球 -->
    <radialGradient id="r3" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#5de6d8"/>
      <stop offset="100%" stop-color="#157a70"/>
    </radialGradient>
    <!-- 藍球 -->
    <radialGradient id="r4" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7bb8d8"/>
      <stop offset="100%" stop-color="#245f80"/>
    </radialGradient>
    <!-- 紫球 -->
    <radialGradient id="r5" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <!-- 金球（特別號） -->
    <radialGradient id="rg" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffe97a"/>
      <stop offset="100%" stop-color="#a16207"/>
    </radialGradient>
    <!-- 球陰影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.75" dy="1.5" stdDeviation="1.875" flood-color="#00000070"/>
    </filter>
    <!-- 背景光暈 -->
    <filter id="bgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="11.25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ① 正方形滿版背景 -->
  <rect width="192" height="192" fill="url(#bg)"/>

  <!-- ② 背景裝飾：柔和光暈圓 -->
  <circle cx="48" cy="53.760000000000005" r="53.760000000000005" fill="#e63946" opacity="0.06"/>
  <circle cx="144" cy="61.44" r="42.24" fill="#6d3fa8" opacity="0.08"/>
  <circle cx="96" cy="138.24" r="57.599999999999994" fill="#2a9d8f" opacity="0.07"/>

  <!-- ③ 小星點 -->
  <circle cx="15.4" cy="15.4" r="0.7" fill="white" opacity="0.29"/>
  <circle cx="176.6" cy="11.5" r="0.9" fill="white" opacity="0.33"/>
  <circle cx="9.6" cy="99.8" r="1.2" fill="white" opacity="0.21"/>
  <circle cx="182.4" cy="92.2" r="1.1" fill="white" opacity="0.24"/>
  <circle cx="28.8" cy="169.0" r="0.7" fill="white" opacity="0.39"/>
  <circle cx="163.2" cy="172.8" r="1.3" fill="white" opacity="0.43"/>
  <circle cx="96.0" cy="9.6" r="1.1" fill="white" opacity="0.29"/>
  <circle cx="73.0" cy="176.6" r="0.9" fill="white" opacity="0.27"/>

  <!-- ④ 號碼球（號碼全在 1–47 區間）-->
  <!-- 上排 3 球：06 / 17 / 29 -->
  
  <circle cx="42.24" cy="69.12" r="36.940799999999996" fill="#e6394640"/>
  <circle cx="42.24" cy="69.12" r="28.415999999999997" fill="url(#r1)" filter="url(#shadow)"/>
  <ellipse cx="35.98848" cy="61.163520000000005" rx="10.229759999999999" ry="6.251519999999999" fill="white" opacity="0.32"/>
  <text x="42.24" y="76.47974400000001" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="19.891199999999998" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="1.5628799999999998">06</text>
  
  <circle cx="96" cy="49.92" r="36.940799999999996" fill="#f4a26140"/>
  <circle cx="96" cy="49.92" r="28.415999999999997" fill="url(#r2)" filter="url(#shadow)"/>
  <ellipse cx="89.74848" cy="41.96352" rx="10.229759999999999" ry="6.251519999999999" fill="white" opacity="0.32"/>
  <text x="96" y="57.279744" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="19.891199999999998" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="1.5628799999999998">17</text>
  
  <circle cx="149.76" cy="69.12" r="36.940799999999996" fill="#2a9d8f40"/>
  <circle cx="149.76" cy="69.12" r="28.415999999999997" fill="url(#r3)" filter="url(#shadow)"/>
  <ellipse cx="143.50848" cy="61.163520000000005" rx="10.229759999999999" ry="6.251519999999999" fill="white" opacity="0.32"/>
  <text x="149.76" y="76.47974400000001" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="19.891199999999998" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="1.5628799999999998">29</text>
  <!-- 下排 2 球：33 / 45 -->
  
  <circle cx="65.28" cy="115.19999999999999" r="36.940799999999996" fill="#457b9d40"/>
  <circle cx="65.28" cy="115.19999999999999" r="28.415999999999997" fill="url(#r4)" filter="url(#shadow)"/>
  <ellipse cx="59.02848" cy="107.24351999999999" rx="10.229759999999999" ry="6.251519999999999" fill="white" opacity="0.32"/>
  <text x="65.28" y="122.559744" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="19.891199999999998" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="1.5628799999999998">33</text>
  
  <circle cx="126.72" cy="115.19999999999999" r="36.940799999999996" fill="#9b5de540"/>
  <circle cx="126.72" cy="115.19999999999999" r="28.415999999999997" fill="url(#r5)" filter="url(#shadow)"/>
  <ellipse cx="120.46848" cy="107.24351999999999" rx="10.229759999999999" ry="6.251519999999999" fill="white" opacity="0.32"/>
  <text x="126.72" y="122.559744" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="19.891199999999998" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="1.5628799999999998">45</text>

  <!-- ⑤ 特別號（右下角，金色） -->
  
  <circle cx="159.35999999999999" cy="153.60000000000002" r="26.496000000000002" fill="#ffd70025"/>
  <circle cx="159.35999999999999" cy="153.60000000000002" r="20.3136" fill="none" stroke="#ffd700"
    stroke-width="0.8250000000000001" stroke-dasharray="2.0625 1.3125" opacity="0.9"/>
  <circle cx="159.35999999999999" cy="153.60000000000002" r="17.664" fill="url(#rg)" filter="url(#shadow)"/>
  <ellipse cx="155.82719999999998" cy="149.00736000000003" rx="5.8291200000000005" ry="3.5328000000000004" fill="white" opacity="0.38"/>
  <text x="159.35999999999999" y="159.305472" text-anchor="middle"
    font-family="system-ui,sans-serif"
    font-size="15.0144" font-weight="900" fill="#1c1410">★</text>

  <!-- ⑥ 品牌文字 -->
  <text x="96" y="180.096" text-anchor="middle"
    font-family="system-ui, -apple-system, PingFang TC, sans-serif"
    font-size="7.5" font-weight="700" letter-spacing="0.9375"
    fill="rgba(255,255,255,0.45)">大樂透</text>
</svg>