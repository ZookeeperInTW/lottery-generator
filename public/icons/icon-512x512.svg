<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- 正方形滿版背景漸層 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#0d0d22"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <!-- 紅球 -->
    <radialGradient id="r1" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff8c94"/>
      <stop offset="100%" stop-color="#c1121f"/>
    </radialGradient>
    <!-- 橙球 -->
    <radialGradient id="r2" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffcb8e"/>
      <stop offset="100%" stop-color="#d4721a"/>
    </radialGradient>
    <!-- 青球 -->
    <radialGradient id="r3" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#5de6d8"/>
      <stop offset="100%" stop-color="#157a70"/>
    </radialGradient>
    <!-- 藍球 -->
    <radialGradient id="r4" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7bb8d8"/>
      <stop offset="100%" stop-color="#245f80"/>
    </radialGradient>
    <!-- 紫球 -->
    <radialGradient id="r5" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <!-- 金球（特別號） -->
    <radialGradient id="rg" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffe97a"/>
      <stop offset="100%" stop-color="#a16207"/>
    </radialGradient>
    <!-- 球陰影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000070"/>
    </filter>
    <!-- 背景光暈 -->
    <filter id="bgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ① 正方形滿版背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ② 背景裝飾：柔和光暈圓 -->
  <circle cx="128" cy="143.36" r="143.36" fill="#e63946" opacity="0.06"/>
  <circle cx="384" cy="163.84" r="112.64" fill="#6d3fa8" opacity="0.08"/>
  <circle cx="256" cy="368.64" r="153.6" fill="#2a9d8f" opacity="0.07"/>

  <!-- ③ 小星點 -->
  <circle cx="41.0" cy="41.0" r="2.6" fill="white" opacity="0.43"/>
  <circle cx="471.0" cy="30.7" r="3.6" fill="white" opacity="0.41"/>
  <circle cx="25.6" cy="266.2" r="2.6" fill="white" opacity="0.46"/>
  <circle cx="486.4" cy="245.8" r="3.8" fill="white" opacity="0.19"/>
  <circle cx="76.8" cy="450.6" r="3.3" fill="white" opacity="0.32"/>
  <circle cx="435.2" cy="460.8" r="3.0" fill="white" opacity="0.21"/>
  <circle cx="256.0" cy="25.6" r="2.7" fill="white" opacity="0.34"/>
  <circle cx="194.6" cy="471.0" r="3.8" fill="white" opacity="0.44"/>

  <!-- ④ 號碼球（號碼全在 1–47 區間）-->
  <!-- 上排 3 球：06 / 17 / 29 -->
  
  <circle cx="112.64" cy="184.32" r="98.5088" fill="#e6394640"/>
  <circle cx="112.64" cy="184.32" r="75.776" fill="url(#r1)" filter="url(#shadow)"/>
  <ellipse cx="95.96928" cy="163.10271999999998" rx="27.279359999999997" ry="16.67072" fill="white" opacity="0.32"/>
  <text x="112.64" y="203.94598399999998" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="53.04319999999999" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="4.16768">06</text>
  
  <circle cx="256" cy="133.12" r="98.5088" fill="#f4a26140"/>
  <circle cx="256" cy="133.12" r="75.776" fill="url(#r2)" filter="url(#shadow)"/>
  <ellipse cx="239.32928" cy="111.90272" rx="27.279359999999997" ry="16.67072" fill="white" opacity="0.32"/>
  <text x="256" y="152.745984" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="53.04319999999999" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="4.16768">17</text>
  
  <circle cx="399.36" cy="184.32" r="98.5088" fill="#2a9d8f40"/>
  <circle cx="399.36" cy="184.32" r="75.776" fill="url(#r3)" filter="url(#shadow)"/>
  <ellipse cx="382.68928" cy="163.10271999999998" rx="27.279359999999997" ry="16.67072" fill="white" opacity="0.32"/>
  <text x="399.36" y="203.94598399999998" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="53.04319999999999" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="4.16768">29</text>
  <!-- 下排 2 球：33 / 45 -->
  
  <circle cx="174.08" cy="307.2" r="98.5088" fill="#457b9d40"/>
  <circle cx="174.08" cy="307.2" r="75.776" fill="url(#r4)" filter="url(#shadow)"/>
  <ellipse cx="157.40928000000002" cy="285.98272" rx="27.279359999999997" ry="16.67072" fill="white" opacity="0.32"/>
  <text x="174.08" y="326.825984" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="53.04319999999999" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="4.16768">33</text>
  
  <circle cx="337.92" cy="307.2" r="98.5088" fill="#9b5de540"/>
  <circle cx="337.92" cy="307.2" r="75.776" fill="url(#r5)" filter="url(#shadow)"/>
  <ellipse cx="321.24928" cy="285.98272" rx="27.279359999999997" ry="16.67072" fill="white" opacity="0.32"/>
  <text x="337.92" y="326.825984" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="53.04319999999999" font-weight="900" fill="white"
    paint-order="stroke" stroke="rgba(0,0,0,0.25)" stroke-width="4.16768">45</text>

  <!-- ⑤ 特別號（右下角，金色） -->
  
  <circle cx="424.96" cy="409.6" r="70.656" fill="#ffd70025"/>
  <circle cx="424.96" cy="409.6" r="54.169599999999996" fill="none" stroke="#ffd700"
    stroke-width="2.2" stroke-dasharray="5.5 3.5" opacity="0.9"/>
  <circle cx="424.96" cy="409.6" r="47.104" fill="url(#rg)" filter="url(#shadow)"/>
  <ellipse cx="415.5392" cy="397.35296" rx="15.54432" ry="9.4208" fill="white" opacity="0.38"/>
  <text x="424.96" y="424.814592" text-anchor="middle"
    font-family="system-ui,sans-serif"
    font-size="40.038399999999996" font-weight="900" fill="#1c1410">★</text>

  <!-- ⑥ 品牌文字 -->
  <text x="256" y="480.256" text-anchor="middle"
    font-family="system-ui, -apple-system, PingFang TC, sans-serif"
    font-size="20" font-weight="700" letter-spacing="2.5"
    fill="rgba(255,255,255,0.45)">大樂透</text>
</svg>